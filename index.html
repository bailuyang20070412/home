<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quadratic Equation Solver</title>
</head>
<body>
    <h1>Quadratic Equation Solver (ax² + bx + c = 0)</h1>
    <script>
        // 1. 三次 prompt 获取系数 a, b, c
        const aStr = prompt("Please enter coefficient a (a ≠ 0):", "1");
        const bStr = prompt("Please enter coefficient b:", "0");
        const cStr = prompt("Please enter coefficient c:", "0");

        // 2. 转换为数字
        const a = parseFloat(aStr);
        const b = parseFloat(bStr);
        const c = parseFloat(cStr);

        // 输入合法性校验
        if (isNaN(a) || isNaN(b) || isNaN(c)) {
            alert("Error: Please enter valid numbers for a, b, c!");
            throw new Error("Invalid input: not a number");
        }
        if (a === 0) {
            alert("Error: Coefficient a cannot be 0 (this is not a quadratic equation)!");
            throw new Error("Invalid input: a is 0");
        }

        // 3. 计算判别式 delta = b² - 4ac
        const delta = b * b - 4 * a * c;

        // 4. 计算两个根
        const sqrtDelta = Math.sqrt(delta);
        const x1 = (-b + sqrtDelta) / (2 * a);
        const x2 = (-b - sqrtDelta) / (2 * a);

        // 5. console.log 输出结果
        console.log(`Quadratic equation: ${a}x² + ${b}x + ${c} = 0`);
        console.log(`Delta = ${delta}`);
        console.log(`Root x1 = ${x1}`);
        console.log(`Root x2 = ${x2}`);

        // 6. alert 展示结果给用户
        alert(`Equation: ${a}x² + ${b}x + ${c} = 0\nx1 = ${x1.toFixed(4)}\nx2 = ${x2.toFixed(4)}`);
    </script>
</body>
</html>
